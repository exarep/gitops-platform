apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitops-platform-external-secrets
rules:
  - apiGroups:
      - external-secrets.io
    resources:
      - clustersecretstores
      - externalsecrets
      - secretstores
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitops-platform-external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitops-platform-external-secrets
subjects:
  - kind: ServiceAccount
    name: gitops-platform-argocd-application-controller
    namespace: gitops-platform
