---
- name: Bootstrap fresh cluster
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_access_key_id: "{{ lookup('ansible.builtin.ini', 'aws_access_key_id', section=aws_profile | default('default'), file='~/.aws/credentials') }}"
    aws_secret_access_key: "{{ lookup('ansible.builtin.ini', 'aws_secret_access_key', section=aws_profile | default('default'), file='~/.aws/credentials') }}"

  tasks:
    - name: Verify OpenShift CLI login
      kubernetes.core.k8s_cluster_info:
      register: cluster_info


    - name: Display cluster details
      ansible.builtin.debug:
        msg: "Connected to {{ cluster_info.connection.host }}"

    - name: Apply external-secrets-operator manifests
      kubernetes.core.k8s:
        state: present
        src: "{{ item }}"
      loop:
        - resources/external-secrets-operator/namespace.yaml
        - resources/external-secrets-operator/operator-group.yaml
        - resources/external-secrets-operator/subscription.yaml

    - name: Wait for external-secrets-operator CSV to succeed
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: external-secrets-operator
        label_selectors:
          - "operators.coreos.com/openshift-external-secrets-operator.external-secrets-operator"
      register: csv_result
      until:
        - csv_result.resources | length > 0
        - csv_result.resources[0].status.phase | default('') == 'Succeeded'
      retries: 30
      delay: 10

    - name: Apply ExternalSecretsConfig
      kubernetes.core.k8s:
        state: present
        src: resources/external-secrets-operator/external-secrets-config.yaml

    - name: Wait for external-secrets webhook to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: external-secrets-webhook
        namespace: external-secrets
      register: webhook_result
      until:
        - webhook_result.resources | length > 0
        - (webhook_result.resources[0].status.readyReplicas | default(0)) >= 1
      retries: 30
      delay: 10

    - name: Create aws-secrets-manager-credentials secret in OpenShift
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: aws-secrets-manager-credentials
            namespace: external-secrets-operator
          type: Opaque
          stringData:
            aws_access_key_id: "{{ aws_access_key_id }}"
            aws_secret_access_key: "{{ aws_secret_access_key }}"
      no_log: true
    
    - name: Apply ClusterSecretStore for AWS Secrets Manager
      kubernetes.core.k8s:
        state: present
        src: resources/external-secrets-operator/cluster-secret-store.yaml

    - name: Apply Test External Secret
      kubernetes.core.k8s:
        state: present
        src: resources/external-secrets-operator/test-external-secret.yaml

    - name: Wait for test secret to be created by External Secrets Operator
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: test
        namespace: external-secrets-operator
      register: test_secret_result
      until:
        - test_secret_result.resources | length > 0
      retries: 30
      delay: 10
      
    - name: Verify test ExternalSecret status is SecretSynced
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: test-external-secret
        namespace: external-secrets-operator
      register: test_es_result
      until:
        - test_es_result.resources | length > 0
        - test_es_result.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
      retries: 30
      delay: 10

#####
# Bootstrap openshift-gitops-operator
#####

    - name: Apply openshift-gitops-operator manifests
      kubernetes.core.k8s:
        state: present
        src: "{{ item }}"
      loop:
        - resources/openshift-gitops-operator/namespace.yaml
        - resources/openshift-gitops-operator/operator-group.yaml
        - resources/openshift-gitops-operator/subscription.yaml

    - name: Wait for openshift-gitops-operator CSV to succeed
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-gitops-operator
        label_selectors:
          - "operators.coreos.com/openshift-gitops-operator.openshift-gitops-operator"
      register: gitops_csv_result
      until:
        - gitops_csv_result.resources | length > 0
        - gitops_csv_result.resources[0].status.phase | default('') == 'Succeeded'
      retries: 30
      delay: 10

    - name: Apply gitops-platform namespace and ArgoCD instance
      kubernetes.core.k8s:
        state: present
        src: "{{ item }}"
      loop:
        - resources/gitops-platform/namespace.yaml
        - resources/gitops-platform/argocd.yaml

    - name: Wait for gitops-platform ArgoCD server to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: gitops-platform-server
        namespace: gitops-platform
      register: argocd_server_check
      until:
        - argocd_server_check.resources | length > 0
        - (argocd_server_check.resources[0].status.readyReplicas | default(0)) >= 1
      retries: 30
      delay: 10

